services:
  backend:
    build: ./backend
    ports:
      - "${BACKEND_PORT}:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    networks: [app-net]
    restart: unless-stopped

  dashboard:
    build: ./dashboard
    ports:
      - "${DASHBOARD_PORT}:80"
    depends_on:
      - backend
    networks: [app-net]
    restart: unless-stopped

  db:
    build: ./db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASS}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [app-net]
    restart: unless-stopped

volumes:
  pg_data:

networks:
  app-net:
    driver: bridge
